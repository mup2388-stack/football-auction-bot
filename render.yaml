# Render Blueprint — Bot + Website with Turso cloud database
# The free plan works because Turso stores data externally.
# Data survives restarts permanently (no ephemeral disk needed).
services:
  - type: web
    name: auction-bot
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    healthCheckPath: /
    envVars:
      - key: DISCORD_TOKEN
        sync: false
      - key: ADMIN_IDS
        sync: false
      - key: WEB_ENABLED
        value: "true"
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: DISCORD_CLIENT_ID
        sync: false
      - key: DISCORD_CLIENT_SECRET
        sync: false
      - key: WEBHOOK_URL
        sync: false
      # Turso cloud database (survives restarts):
      - key: TURSO_URL
        sync: false
      - key: TURSO_AUTH_TOKEN
        sync: false
      # OAuth redirect (leave empty, auto-detected from request):
      - key: OAUTHLIB_INSECURE_TRANSPORT
        value: "0"
